- name: Generate XMLTV
        run: |
          php manager.php build

      - name: Debug – list XML files
        run: |
          echo "=== XML files found ==="
          find . -type f -name "*.xml"

      - name: Prepare Data folder
        run: |
          mkdir -p Data

      - name: Move XML to Data
        run: |
          XML_FILE=$(find . -type f -name "*.xml" ! -path "./vendor/*" | head -n 1)
          if [ -z "$XML_FILE" ]; then
            echo "❌ No XML file generated"
            exit 1
          fi
          mv "$XML_FILE" Data/guide_fr.xml

      - name: Commit & Push XML
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Data/guide_fr.xml
          git commit -m "Update France EPG XML" || echo "No changes"
          git push
