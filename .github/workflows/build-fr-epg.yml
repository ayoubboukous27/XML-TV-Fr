name: Generate EPG XMLTV (STRICT)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Permission check (fail fast)
      - name: Permission check
        run: |
          echo test > .perm
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .perm
          git commit -m "perm check" >/dev/null 2>&1 || exit 1
          git push >/dev/null 2>&1 || exit 1
          rm .perm
          git add .perm
          git commit -m "cleanup" >/dev/null 2>&1 || true
          git push >/dev/null 2>&1 || true

      - name: Build Docker image
        run: docker build -t xmltvfr . >/dev/null 2>&1

      - name: Run XMLTV generator
        run: |
          # إنشاء المجلدات
          mkdir -p data 2>/dev/null || true
          mkdir -p config 2>/dev/null || true
          
          # تشغيل الحاوية واستخراج أسماء القنوات فقط
          docker run \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/config:/app/config \
            xmltvfr 2>&1 | while IFS= read -r line; do
              # استخراج اسم القناة فقط (أول كلمة قبل .fr)
              if echo "$line" | grep -qE '([a-zA-Z0-9]+)\.fr'; then
                channel=$(echo "$line" | grep -oE '[a-zA-Z0-9]+\.fr' | cut -d'.' -f1)
                echo "$channel"
              fi
            done
          
          # التحقق من وجود الملف
          if [ ! -f data/guide.xml ]; then
            exit 1
          fi

      - name: Commit EPG files
        run: |
          git config user.name "github-actions" >/dev/null 2>&1
          git config user.email "github-actions@github.com" >/dev/null 2>&1
          
          git add data/ >/dev/null 2>&1
          
          if ! git diff --staged --quiet >/dev/null 2>&1; then
            git commit -m "Update EPG XMLTV [skip ci]" >/dev/null 2>&1
            git push >/dev/null 2>&1
          fi
