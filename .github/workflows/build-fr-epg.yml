name: Generate EPG XMLTV (STRICT)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Permission check (fail fast)
      - name: Permission check
        run: |
          echo test > .perm
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .perm
          git commit -m "perm check" >/dev/null 2>&1 || exit 1
          git push >/dev/null 2>&1 || exit 1
          rm .perm
          git add .perm
          git commit -m "cleanup" >/dev/null 2>&1 || true
          git push >/dev/null 2>&1 || true

      - name: Build Docker image
        # 📌 التعديل 1: إزالة >/dev/null 2>&1 لرؤية أخطاء البناء إن وجدت
        run: docker build -t xmltvfr .

      - name: Run XMLTV generator
        # 📌 التعديل 2: تغيير اسم الخطوة وإزالة >/dev/null 2>&1
        run: |
          # 📌 التعديل 3: تغيير اسم المجلد من var/export إلى data
          mkdir -p data
          mkdir -p config
          
          # 📌 التعديل 4: تغيير مسار Volume من /app/var/export إلى /app/data
          docker run \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/config:/app/config \
            xmltvfr

          # 📌 التعديل 5: عرض محتويات المجلد للتأكد
          echo "=== Generated files in data/ ==="
          ls -la data/
          
          # 📌 التعديل 6: البحث عن guide.xml بدلاً من xmltv.xml
          if [ ! -f data/guide.xml ]; then
            echo "❌ ERROR: guide.xml NOT GENERATED in data/ directory"
            echo "Contents of data/:"
            ls -la data/
            exit 1
          else
            echo "✅ guide.xml generated successfully"
            # 📌 التعديل 7: نسخ الملف للاحتياط (اختياري)
            cp data/guide.xml data/xmltv.xml
          fi

      - name: Commit EPG files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 📌 التعديل 8: تغيير المسار من var/export إلى data
          git add data/
          
          # 📌 التعديل 9: التحقق من وجود تغييرات قبل الـ commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG XMLTV [skip ci]"
            git push
          fi
