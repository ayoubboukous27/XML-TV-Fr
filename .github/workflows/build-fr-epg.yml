name: Generate EPG XMLTV

on:
  schedule:
    - cron: "0 4 * * *"   # كل يوم
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t xmltvfr .

      - name: Run XMLTV generator
        run: |
          mkdir -p var/export
          docker run \
            -v ${{ github.workspace }}/var/export:/app/var/export \
            -v ${{ github.workspace }}/config:/app/config \
            xmltvfr

      - name: Commit EPG files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add var/export || true
          git commit -m "Update EPG XMLTV" || echo "No changes"
          git push
