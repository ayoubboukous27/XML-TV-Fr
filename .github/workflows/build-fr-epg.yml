name: Build France EPG XML

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # يوميًا 04:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Install Composer dependencies
        run: |
          composer install --no-interaction --no-progress

      - name: Generate EPG XML
        run: |
          php manager.php build

      - name: Debug – list generated XML files
        run: |
          echo "=== XML files found ==="
          find . -type f -name "*.xml"

      - name: Prepare Data folder
        run: |
          mkdir -p Data

      - name: Move XML to Data/guide_fr.xml
        run: |
          XML_FILE=$(find . -type f -name "*.xml" ! -path "./vendor/*" | head -n 1)
          if [ -z "$XML_FILE" ]; then
            echo "❌ No XML file generated"
            exit 1
          fi
          mv "$XML_FILE" Data/guide_fr.xml

      - name: Commit & Push XML
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Data/guide_fr.xml
          git commit -m "Update France EPG XML" || echo "No changes to commit"
          git push
